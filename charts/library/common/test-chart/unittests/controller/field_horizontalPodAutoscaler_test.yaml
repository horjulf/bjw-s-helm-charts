---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: controller - fields - horizontalPodAutoscaler
templates:
  - common.yaml
values:
  - ../_values/controllers_main_default_container.yaml

tests:
  - it: default should not exist
    asserts:
      - not: true
        containsDocument:
          apiVersion: autoscaling/v2
          kind: HorizontalPodAutoscaler
          any: true

  - it: created with maxReplicas only
    set:
      controllers:
        main:
          replicas: null
          horizontalPodAutoscaler:
            maxReplicas: 5
    documentSelector:
      path: $[?(@.kind == "HorizontalPodAutoscaler")].metadata.name
      value: release-name
    asserts:
      - equal:
          path: spec.maxReplicas
          value: 5
      - notExists:
          path: spec.minReplicas

  - it: created with minReplicas and maxReplicas
    set:
      controllers:
        main:
          replicas: null
          horizontalPodAutoscaler:
            minReplicas: 2
            maxReplicas: 10
    documentSelector:
      path: $[?(@.kind == "HorizontalPodAutoscaler")].metadata.name
      value: release-name
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 10

  - it: created with cpu resource metric
    set:
      controllers:
        main:
          replicas: null
          horizontalPodAutoscaler:
            maxReplicas: 5
            metrics:
              - type: Resource
                resource:
                  name: cpu
                  target:
                    type: Utilization
                    averageUtilization: 80
    documentSelector:
      path: $[?(@.kind == "HorizontalPodAutoscaler")].metadata.name
      value: release-name
    asserts:
      - equal:
          path: spec.metrics[0].type
          value: Resource
      - equal:
          path: spec.metrics[0].resource.name
          value: cpu
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 80

  - it: multiple controllers with prefix and suffix
    set:
      controllers:
        main:
          replicas: null
          horizontalPodAutoscaler:
            maxReplicas: 5
        second:
          replicas: null
          prefix: prefix
          suffix: suffix
          containers:
            main:
              image:
                repository: ghcr.io/mendhak/http-https-echo
                tag: 31
          horizontalPodAutoscaler:
            maxReplicas: 3
    asserts:
      - containsDocument:
          apiVersion: autoscaling/v2
          kind: HorizontalPodAutoscaler
          name: release-name-main
          any: true
      - containsDocument:
          apiVersion: autoscaling/v2
          kind: HorizontalPodAutoscaler
          name: prefix-release-name-second-suffix
          any: true

  - it: hpa targets the correct controller
    set:
      controllers:
        main:
          replicas: null
          horizontalPodAutoscaler:
            maxReplicas: 5
    documentSelector:
      path: $[?(@.kind == "HorizontalPodAutoscaler")].metadata.name
      value: release-name
    asserts:
      - equal:
          path: spec.scaleTargetRef
          value:
            apiVersion: apps/v1
            kind: Deployment
            name: release-name

  - it: scaleTargetRef kind is StatefulSet for statefulset controller type
    set:
      controllers:
        main:
          type: statefulset
          replicas: null
          horizontalPodAutoscaler:
            maxReplicas: 5
    documentSelector:
      path: $[?(@.kind == "HorizontalPodAutoscaler")].metadata.name
      value: release-name
    asserts:
      - equal:
          path: spec.scaleTargetRef.kind
          value: StatefulSet
      - equal:
          path: spec.scaleTargetRef.apiVersion
          value: apps/v1

  - it: auto-suppresses replicas on Deployment when HPA is configured
    set:
      controllers:
        main:
          replicas: 3
          horizontalPodAutoscaler:
            maxReplicas: 10
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: release-name
    asserts:
      - notExists:
          path: spec.replicas

  - it: propagates replicas to minReplicas when minReplicas is not set
    set:
      controllers:
        main:
          replicas: 3
          horizontalPodAutoscaler:
            maxReplicas: 10
    documentSelector:
      path: $[?(@.kind == "HorizontalPodAutoscaler")].metadata.name
      value: release-name
    asserts:
      - equal:
          path: spec.minReplicas
          value: 3
      - equal:
          path: spec.maxReplicas
          value: 10

  - it: does not override minReplicas when explicitly set
    set:
      controllers:
        main:
          replicas: 3
          horizontalPodAutoscaler:
            minReplicas: 5
            maxReplicas: 10
    documentSelector:
      path: $[?(@.kind == "HorizontalPodAutoscaler")].metadata.name
      value: release-name
    asserts:
      - equal:
          path: spec.minReplicas
          value: 5

  - it: hpa with behavior config
    set:
      controllers:
        main:
          replicas: null
          horizontalPodAutoscaler:
            maxReplicas: 10
            behavior:
              scaleDown:
                stabilizationWindowSeconds: 300
                policies:
                  - type: Pods
                    value: 1
                    periodSeconds: 60
    documentSelector:
      path: $[?(@.kind == "HorizontalPodAutoscaler")].metadata.name
      value: release-name
    asserts:
      - equal:
          path: spec.behavior.scaleDown.stabilizationWindowSeconds
          value: 300
      - equal:
          path: spec.behavior.scaleDown.policies[0].type
          value: Pods
