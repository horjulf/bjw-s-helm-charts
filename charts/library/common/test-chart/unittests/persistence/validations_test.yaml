---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: persistence - validations
templates:
  - common.yaml
values:
  - ../_values/controllers_main_default_container.yaml
tests:
  - it: configmap persistence type with invalid identifier reference should fail
    set:
      persistence:
        configmap:
          type: configMap
          identifier: doesNotExist
    asserts:
      - failedTemplate:
          errorMessage: "Persistence 'configmap': No ConfigMap found with identifier 'doesNotExist'. Ensure a ConfigMap with this identifier exists and is enabled under 'configMaps.doesNotExist'."

  - it: secret persistence type with invalid identifier reference should fail
    set:
      persistence:
        secret:
          type: secret
          identifier: doesNotExist
    asserts:
      - failedTemplate:
          errorMessage: "Persistence 'secret': No Secret found with identifier 'doesNotExist'. Ensure a Secret with this identifier exists and is enabled under 'secrets.doesNotExist'."
