---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: service - validations
templates:
  - common.yaml
values:
  - ../_values/controllers_main_default_container.yaml
tests:
  - it: invalid controller reference should fail
    set:
      service:
        main:
          controller: other
    asserts:
      - failedTemplate:
          errorMessage: "Service 'main': No enabled controller found with identifier 'other'. Available controllers: [main]"

  - it: automatic controller determination should fail when no controller is enabled
    set:
      controllers:
        main:
          enabled: false
      service:
        main: {}
    asserts:
      - failedTemplate:
          errorMessage: "Service 'main': controller field is required because automatic controller detection is not possible (found 0 enabled controllers). Please specify which controller this service should use."

  - it: automatic controller determination should fail when >1 controller is enabled
    set:
      controllers:
        second:
          containers:
            main:
              image:
                repository: ghcr.io/mendhak/http-https-echo
                tag: 31

      service:
        main: {}
    asserts:
      - failedTemplate:
          errorMessage: "Service 'main': controller field is required because automatic controller detection is not possible (found 2 enabled controllers). Please specify which controller this service should use."

  - it: no ports enabled should fail
    values:
      - ../_values/service_main_default.yaml
    set:
      service:
        main:
          ports:
            http:
              enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "Service 'main': No ports are enabled. At least one port must be enabled for service type 'ClusterIP'. Add ports under 'services.main.ports' in your values."
