---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: chart - validations
templates:
  - common.yaml
values:
  - ../_values/controllers_main_default_container.yaml
tests:
  - it: advancedMounts invalid controller reference should fail
    set:
      persistence:
        data:
          type: configMap
          name: myConfigMap
          advancedMounts:
            test:
              main:
                - path: /data/config.yaml
                  readOnly: false
                  mountPropagation: HostToContainer
                  subPath: config.yaml
    asserts:
      - failedTemplate:
          errorMessage: "Persistence 'data': No enabled controller found with identifier 'test'. Ensure a controller with this identifier exists and is enabled under 'controllers.test'."

  - it: advancedMounts for disabled persistence should not fail
    set:
      persistence:
        data:
          enabled: false
          type: configMap
          name: myConfigMap
          advancedMounts:
            test:
              main:
                - path: /data/config.yaml
                  readOnly: false
                  mountPropagation: HostToContainer
                  subPath: config.yaml
    asserts:
      - notFailedTemplate: {}
