---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: pod - fields - initContainers - cyclic dependencies
templates:
  - common.yaml
values:
  - ../_values/controllers_main_default_container.yaml
tests:
  - it: simple cyclic dependency should fail
    set:
      controllers.main.initContainers:
        init1:
          dependsOn: init2
          image:
            repository: test
            tag: test
        init2:
          dependsOn: init1
          image:
            repository: test
            tag: test
    asserts:
      - failedTemplate:
          errorPattern: ^Cyclic dependency detected in initContainer ordering

  - it: complex cyclic dependency should fail
    set:
      controllers.main.initContainers:
        init1:
          dependsOn: init3
          image:
            repository: test
            tag: test
        init2:
          dependsOn: init1
          image:
            repository: test
            tag: test
        init3:
          dependsOn: init2
          image:
            repository: test
            tag: test
    asserts:
      - failedTemplate:
          errorPattern: ^Cyclic dependency detected in initContainer ordering

  - it: missing dependency should fail with clear error
    set:
      controllers.main.initContainers:
        init1:
          dependsOn: nonexistent
          image:
            repository: test
            tag: test
    asserts:
      - failedTemplate:
          errorMessage: "Init container 'init1': References non-existent init container 'nonexistent' in dependsOn. Available init containers: [init1]"
